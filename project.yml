name: ControlPower

configs:
  Debug: debug
  Profiling: debug
  Release: release

options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    macOS: "26.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 45954WVVY3
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    FUSE_BUILD_SCRIPT_PHASES: YES
  configs:
    Debug:
      SWIFT_COMPILATION_MODE: incremental
      ONLY_ACTIVE_ARCH: YES
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      OTHER_SWIFT_FLAGS: -Xfrontend -warn-long-function-bodies=100 -Xfrontend -warn-long-expression-type-checking=100
    Profiling:
      SWIFT_COMPILATION_MODE: wholemodule
      ONLY_ACTIVE_ARCH: YES
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: -O
      OTHER_SWIFT_FLAGS: -Xfrontend -warn-long-function-bodies=100 -Xfrontend -warn-long-expression-type-checking=100
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: -O
      ONLY_ACTIVE_ARCH: NO
      LLVM_LTO: YES_THIN
      DEAD_CODE_STRIPPING: YES
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO

targets:
  ControlPowerHelper:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Helper/Sources
        name: HelperSources
      - path: Shared/Sources
        name: SharedSources
    settings:
      base:
        PRODUCT_NAME: ControlPowerHelper
        PRODUCT_BUNDLE_IDENTIFIER: com.moe.controlpower.helper.bin
        OTHER_CODE_SIGN_FLAGS: --identifier com.moe.controlpower.helper.bin
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ControlPowerHelper
        INFOPLIST_KEY_LSMinimumSystemVersion: "26.0"

  ControlPowerCore:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Sources/AppViewModel.swift
      - path: App/Sources/MutationScheduler.swift
      - path: Shared/Sources
        name: SharedSources
    dependencies:
      - sdk: ServiceManagement.framework
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_NAME: ControlPowerCore
        PRODUCT_BUNDLE_IDENTIFIER: com.moe.controlpower.core
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ControlPowerCore
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  ControlPower:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Sources
        name: AppSources
        excludes:
          - AppViewModel.swift
      - path: App/Resources/Assets.xcassets
      - path: App/Resources/Info.plist
      - path: App/Resources/PrivacyInfo.xcprivacy
      - path: LaunchDaemons/com.moe.controlpower.helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      - target: ControlPowerHelper
        embed: false
      - target: ControlPowerCore
        embed: true
      - sdk: ServiceManagement.framework
      - sdk: AppIntents.framework
    postBuildScripts:
      - name: Embed Helper Binary
        script: |
          set -euo pipefail
          helper="${SCRIPT_INPUT_FILE_0:-}"
          if [[ -z "$helper" || ! -r "$helper" ]]; then
            helper="${SCRIPT_INPUT_FILE_1:-}"
          fi
          destination="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/ControlPowerHelper"
          if [[ -z "$helper" || ! -r "$helper" ]]; then
            echo "error: missing readable helper binary from script inputs"
            exit 1
          fi
          /usr/bin/install -m 755 "$helper" "$destination"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/ControlPowerHelper
          - $(DSTROOT)/usr/local/bin/ControlPowerHelper
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/ControlPowerHelper
    settings:
      base:
        PRODUCT_NAME: ControlPower
        PRODUCT_BUNDLE_IDENTIFIER: com.moe.controlpower
        INFOPLIST_FILE: App/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Profiling:
          CODE_SIGN_ENTITLEMENTS: App/Resources/ControlPowerProfiling.entitlements

  ControlPowerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests
    dependencies:
      - target: ControlPowerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moe.controlpower.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""

schemes:
  ControlPower:
    build:
      targets:
        ControlPower:
          - run
          - analyze
          - archive
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - ControlPowerCore
      targets:
        - name: ControlPowerTests
          parallelizable: true
    archive:
      config: Release
  ControlPowerProfiling:
    build:
      targets:
        ControlPower:
          - run
          - analyze
          - archive
    run:
      config: Profiling
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - ControlPowerCore
      targets:
        - name: ControlPowerTests
          parallelizable: true
    archive:
      config: Release
  ControlPowerCoreTests:
    build:
      targets:
        ControlPowerCore: all
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - ControlPowerCore
      targets:
        - name: ControlPowerTests
          parallelizable: true
